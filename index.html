<!DOCTYPE html>
<html>
<head>
  <title>Doggy Market Pro</title>
  <style>
    body {
      font-family: Arial;
      background: #0d1117;
      color: #e6edf3;
      margin: 0;
    }

    header {
      background: #161b22;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #30363d;
    }

    h1 { color: #58a6ff; margin: 0; }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
      width: 200px;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .connect { background: #238636; }
    .buy { background: #238636; }
    .sell { background: #da3633; }

    .container { padding: 30px; }

    .card {
      background: #161b22;
      padding: 20px;
      border-radius: 10px;
      border: 1px solid #30363d;
      margin-bottom: 20px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
    }

    th, td {
      padding: 12px;
      border-bottom: 1px solid #30363d;
    }

    th { color: #8b949e; }

    .wallet { color: #58a6ff; }
  </style>
</head>

<body>

<header>
  <h1>🐶 Doggy Market</h1>
  <div>
    <input type="text" id="search" placeholder="Search token..." onkeyup="filterTokens()">
    <button class="connect" onclick="connectWallet()">Connect</button>
  </div>
</header>

<div class="container">

  <div class="card">
    <p id="wallet" class="wallet">Wallet not connected</p>
  </div>

  <div class="card">
    <h2>DRC-20 Tokens</h2>
    <table>
      <thead>
        <tr>
          <th>Token</th>
          <th>Price (DOGE)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="table"></tbody>
    </table>
  </div>

</div>

<script>
  let wallet = null;

  let tokens = [
    { name: "DOGEAI", price: 0.01 },
    { name: "SHIBX", price: 0.005 },
    { name: "MOONDOGE", price: 0.02 },
    { name: "DOGEMOON", price: 0.015 },
    { name: "DOGEKING", price: 0.03 }
  ];

  function connectWallet() {
    wallet = "0xABC123...XYZ";
    document.getElementById("wallet").innerText = "Connected: " + wallet;
  }

  function buy(name) {
    alert("🚀 Bought " + name);
  }

  function sell(name) {
    alert("💰 Sold " + name);
  }

  function loadTokens(list) {
    let html = "";
    list.forEach(t => {
      html += `
        <tr>
          <td>${t.name}</td>
          <td>${t.price.toFixed(4)}</td>
          <td>
            <button class="buy" onclick="buy('${t.name}')">Buy</button>
            <button class="sell" onclick="sell('${t.name}')">Sell</button>
          </td>
        </tr>
      `;
    });
    document.getElementById("table").innerHTML = html;
  }

  function filterTokens() {
    let value = document.getElementById("search").value.toLowerCase();
    let filtered = tokens.filter(t => t.name.toLowerCase().includes(value));
    loadTokens(filtered);
  }

  // Fake live price update
  setInterval(() => {
    tokens = tokens.map(t => ({
      ...t,
      price: t.price + (Math.random() - 0.5) * 0.002
    }));
    filterTokens();
  }, 2000);

  loadTokens(tokens);
</script>

</body>
</html>
