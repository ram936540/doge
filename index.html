<!DOCTYPE html>
<html>
<head>
  <title>Doggy Market Ultra</title>

  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    body { margin:0; font-family:Arial; background:#0d1117; color:#e6edf3; }
    header { display:flex; justify-content:space-between; padding:15px 25px; background:#161b22; border-bottom:1px solid #30363d; }
    h1 { color:#58a6ff; }
    input { padding:8px; border-radius:6px; border:none; margin:5px; }
    button { padding:8px 15px; border:none; border-radius:6px; cursor:pointer; color:white; }
    .connect { background:#238636; }
    .buy { background:#238636; }
    .sell { background:#da3633; }
    .container { padding:20px; display:grid; grid-template-columns:repeat(auto-fill,minmax(220px,1fr)); gap:20px; }
    .card { background:#161b22; padding:15px; border-radius:10px; border:1px solid #30363d; }
    .price { color:#58a6ff; }
  </style>
</head>

<body>

<header>
  <h1>🐶 Doggy Market</h1>
  <div>
    <input id="search" placeholder="Search..." onkeyup="filterTokens()">
    <button class="connect" onclick="connectMetaMask()">MetaMask</button>
  </div>
</header>

<div style="padding:15px;">
  <p id="wallet">Wallet not connected</p>

  <h3>Connect MyDoge Wallet (Enter Address)</h3>
  <input id="dogeWallet" placeholder="Enter MyDoge address">
  <button onclick="connectDoge()">Connect MyDoge</button>
</div>

<div class="container" id="tokens"></div>

<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>
let tokens = [
  { name: "DOGEAI", price: 0.01 },
  { name: "SHIBX", price: 0.005 },
  { name: "MOONDOGE", price: 0.02 }
];

let ethWallet = null;
let dogeWallet = null;

// MetaMask connect
async function connectMetaMask() {
  if (window.ethereum) {
    let acc = await window.ethereum.request({ method: 'eth_requestAccounts' });
    ethWallet = acc[0];
    document.getElementById("wallet").innerText = "ETH: " + ethWallet;
  } else {
    alert("Install MetaMask");
  }
}

// MyDoge connect (manual)
function connectDoge() {
  dogeWallet = document.getElementById("dogeWallet").value;
  document.getElementById("wallet").innerText += " | DOGE: " + dogeWallet;
}

// Toast
function toast(msg) {
  Toastify({ text: msg, duration: 2000, gravity: "top", position: "right" }).showToast();
}

// BUY logic (realistic flow)
function buy(name, price) {
  if (!dogeWallet) {
    alert("Enter MyDoge wallet first");
    return;
  }

  const receiver = "YOUR_DOGE_RECEIVING_ADDRESS";

  toast("Send " + price + " DOGE to:");
  alert(
    "🚨 PAYMENT STEP 🚨\n\n" +
    "Open MyDoge Wallet\n" +
    "Send " + price + " DOGE to:\n\n" +
    receiver +
    "\n\nThen click confirm"
  );
}

// SELL (demo)
function sell(name) {
  toast("Sell request placed for " + name);
}

// render
function render(list) {
  let html = "";
  list.forEach(t => {
    html += `
      <div class="card">
        <h3>${t.name}</h3>
        <p class="price">${t.price.toFixed(4)} DOGE</p>
        <button class="buy" onclick="buy('${t.name}', ${t.price})">Buy</button>
        <button class="sell" onclick="sell('${t.name}')">Sell</button>
      </div>
    `;
  });
  document.getElementById("tokens").innerHTML = html;
}

function filterTokens() {
  let val = document.getElementById("search").value.toLowerCase();
  let filtered = tokens.filter(t => t.name.toLowerCase().includes(val));
  render(filtered);
}

// fake price update
setInterval(() => {
  tokens = tokens.map(t => ({
    ...t,
    price: t.price + (Math.random() - 0.5) * 0.002
  }));
  filterTokens();
}, 2000);

render(tokens);
</script>

</body>
</html>
