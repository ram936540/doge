<!DOCTYPE html>
<html>
<head>
  <title>Doggy Market Ultra</title>

  <!-- Toast -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0d1117;
      color: #e6edf3;
    }

    header {
      display: flex;
      justify-content: space-between;
      padding: 15px 25px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
    }

    h1 { color: #58a6ff; }

    input {
      padding: 8px;
      border-radius: 6px;
      border: none;
    }

    button {
      padding: 8px 15px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      color: white;
    }

    .connect { background: #238636; }

    .container {
      padding: 20px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: #161b22;
      padding: 15px;
      border-radius: 10px;
      border: 1px solid #30363d;
    }

    .price { color: #58a6ff; }

    .buy { background: #238636; }
    .sell { background: #da3633; }

  </style>
</head>

<body>

<header>
  <h1>🐶 Doggy Market</h1>
  <div>
    <input id="search" placeholder="Search..." onkeyup="filterTokens()">
    <button class="connect" onclick="connectWallet()">Connect</button>
  </div>
</header>

<div style="padding:15px;">
  <p id="wallet">Wallet not connected</p>
</div>

<div class="container" id="tokens"></div>

<!-- Toast JS -->
<script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

<script>
let tokens = [
  { name: "DOGEAI", price: 0.01 },
  { name: "SHIBX", price: 0.005 },
  { name: "MOONDOGE", price: 0.02 },
  { name: "DOGEKING", price: 0.03 },
  { name: "DOGEDEX", price: 0.015 }
];

let wallet = null;

async function connectWallet() {
  if (window.ethereum) {
    try {
      const accounts = await window.ethereum.request({ method: 'eth_requestAccounts' });
      wallet = accounts[0];
      document.getElementById("wallet").innerText = "Connected: " + wallet;
    } catch {
      alert("Connection failed");
    }
  } else {
    alert("Install MetaMask");
  }
}

function toast(msg) {
  Toastify({
    text: msg,
    duration: 2000,
    gravity: "top",
    position: "right"
  }).showToast();
}

function buy(name) {
  toast("🚀 Bought " + name);
}

function sell(name) {
  toast("💰 Sold " + name);
}

function render(list) {
  let html = "";
  list.forEach(t => {
    html += `
      <div class="card">
        <h3>${t.name}</h3>
        <p class="price">${t.price.toFixed(4)} DOGE</p>
        <button class="buy" onclick="buy('${t.name}')">Buy</button>
        <button class="sell" onclick="sell('${t.name}')">Sell</button>
      </div>
    `;
  });
  document.getElementById("tokens").innerHTML = html;
}

function filterTokens() {
  let val = document.getElementById("search").value.toLowerCase();
  let filtered = tokens.filter(t => t.name.toLowerCase().includes(val));
  render(filtered);
}

// Fake live price updates
setInterval(() => {
  tokens = tokens.map(t => ({
    ...t,
    price: t.price + (Math.random() - 0.5) * 0.002
  }));
  filterTokens();
}, 2000);

render(tokens);
</script>

</body>
</html>
